spring:
  # PostgreSQL Configuration (Production - Railway)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:sakura.proxy.rlwy.net}:${PGPORT:17451}/${PGDATABASE:railway}}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:${PGUSER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:YuTJvljTRuIwrjnnqKyGlKeIWBGYVLAG}}

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true

# Logging
logging:
  level:
    kr.co.tobetheone.ncms: INFO
    org.springframework.web: WARN
    org.flywaydb: INFO
